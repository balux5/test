<!DOCTYPE html>
<html lang="az">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizika Test Portalı</title>
      <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9703596160659929"
     crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        h1, h2 { text-align: center; color: #1a73e8; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .btn-style { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background-color: #1a73e8; color: white; }
        .btn-danger { background-color: #d93025; color: white; }
        .btn-success { background-color: #1e8e3e; color: white; }
        .btn-secondary { background-color: #5f6368; color: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        table, th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f8f9fa; }

        #adminPanel, #userPanel, #loginSection { display: none; }
        
        .question { 
            background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #1a73e8; 
            display: flex; flex-direction: column; gap: 10px; 
        }
        .question-header { font-weight: bold; font-size: 1.1em; margin: 0; display: flex; align-items: flex-start; gap: 8px; }
        .options-container { display: flex; flex-direction: column; gap: 5px; padding-left: 28px; }
        .option-label { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px; border-radius: 6px; transition: 0.2s; }
        .option-label:hover { background-color: #e9ecef; }
        input[type="radio"] { width: 18px; height: 18px; cursor: pointer; }
        
        /* Variantlar bağlandıqda (disabled) görünüşü */
        input[disabled] { cursor: not-allowed; opacity: 0.6; }
        .disabled-label { pointer-events: none; }

        /* Yeni Rəng Klasları */
        .correct { background-color: #d4edda !important; color: #155724; border: 1px solid #c3e6cb; }
        .wrong { background-color: #f8d7da !important; color: #721c24; border: 1px solid #f5c6cb; }
        .missed { border: 2px dashed #28a745; background-color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection" style="display: block;">
        <h1>Sistemə Giriş</h1>
        <input type="text" id="username" placeholder="Adınız">
        <input type="password" id="password" placeholder="Şifrə">
        <button onclick="handleLogin()" class="btn-style btn-primary">Daxil ol</button>
    </div>

    <div id="adminPanel">
        <h2>Admin Paneli</h2>
        <div style="background: #fff3cd; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
            <strong>Sistem Statusu:</strong> <span id="statusLabel">Aktiv</span>
            <button id="toggleBtn" onclick="toggleSystem()" class="btn-style"></button>
        </div>
        <h3>Şagird Nəticələri</h3>
        <table id="resultsTable">
            <thead><tr><th>Şagird</th><th>Nəticə</th><th>Tarix</th></tr></thead>
            <tbody id="resultsBody"></tbody>
        </table>
        <button onclick="clearResults()" class="btn-style btn-secondary">Nəticələri Sil</button>
        <button onclick="location.reload()" class="btn-style btn-danger">Çıxış</button>
    </div>

    <div id="userPanel">
        <h2 id="welcomeUser"></h2>
        <select id="classSelect" onchange="loadQuiz(this.value)">
            <option value="sinif7_fizika.json">7-ci sinif</option>
            <option value="sinif8_fizika.json">8-ci sinif</option>
            <option value="sinif9_fizika.json">9-ci sinif</option>
            <option value="sinif10_fizika.json">10-ci sinif</option>
            <option value="sinif11_fizika.json">11-ci sinif</option>
             
        </select>
        <div id="quizArea"></div>
        <button id="finishBtn" onclick="finishQuiz()" class="btn-style btn-success">Testi Bitir</button>
        <div id="userResult"></div>
        <button onclick="location.reload()" class="btn-style btn-secondary">Çıxış</button>
    </div>
</div>

<script>
    let currentQuizData = [];
    let currentUser = "";
    let isSystemOpen = localStorage.getItem('isSystemOpen') !== 'false'; 
    let allResults = JSON.parse(localStorage.getItem('quizResults')) || [];

    function handleLogin() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        if (u === "ebalux" && p === "12345") showAdmin();
        else if (u !== "") {
            if (!isSystemOpen) return alert("Sistem bağlıdır!");
            currentUser = u; showUser();
        }
    }

    function showAdmin() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        updateAdminUI();
    }

    function showUser() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('userPanel').style.display = 'block';
        document.getElementById('welcomeUser').innerText = "Salam, " + currentUser;
        loadQuiz(document.getElementById('classSelect').value);
    }

    function toggleSystem() {
        isSystemOpen = !isSystemOpen;
        localStorage.setItem('isSystemOpen', isSystemOpen);
        updateAdminUI();
    }

    function updateAdminUI() {
        const btn = document.getElementById('toggleBtn');
        const label = document.getElementById('statusLabel');
        label.innerText = isSystemOpen ? "Aktiv" : "Bağlı";
        label.style.color = isSystemOpen ? "green" : "red";
        btn.innerText = isSystemOpen ? "Sistemi Bağla" : "Sistemi Aç";
        btn.className = isSystemOpen ? "btn-style btn-danger" : "btn-style btn-success";

        const body = document.getElementById('resultsBody');
        body.innerHTML = "";
        [...allResults].reverse().forEach(res => {
            body.innerHTML += `<tr><td>${res.name}</td><td>${res.score}</td><td>${res.date}</td></tr>`;
        });
    }

    function loadQuiz(file) {
        fetch(file).then(r => r.json()).then(data => {
            currentQuizData = data;
            const area = document.getElementById('quizArea');
            area.innerHTML = "";
            data.forEach((q, i) => {
                area.innerHTML += `
                    <div class="question" id="qBox${i}">
                        <p class="question-header"><span><strong>${i+1}.</strong></span><span>${q.question}</span></p>
                        <div class="options-container" id="optCont${i}">
                            ${q.options.map((opt, optIdx) => `
                                <label class="option-label" id="label-q${i}-opt${optIdx}">
                                    <input type="radio" name="q${i}" value="${opt}"> <span>${opt}</span>
                                </label>`).join('')}
                        </div>
                    </div>`;
            });
            document.getElementById('finishBtn').style.display = "block";
            document.getElementById('userResult').innerHTML = "";
        });
    }

    function finishQuiz() {
        let correct = 0;
        
        currentQuizData.forEach((q, i) => {
            const radios = document.getElementsByName(`q${i}`);
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            
            radios.forEach((r, optIdx) => {
                const label = document.getElementById(`label-q${i}-opt${optIdx}`);
                r.disabled = true;
                label.classList.add('disabled-label');

                // Düzgün variantı tap və yaşıl elə
                if (r.value === q.correctAnswer) {
                    label.classList.add('correct');
                }

                // İstifadəçi səhv variant seçibsə, onu qırmızı elə
                if (selected && selected.value !== q.correctAnswer && r.checked) {
                    label.classList.add('wrong');
                }
            });

            if (selected && selected.value === q.correctAnswer) correct++;
        });
        const resultText = `${correct} / ${currentQuizData.length}`;
        document.getElementById('userResult').innerHTML = `<h3>Nəticəniz: ${resultText}</h3>`;
        document.getElementById('finishBtn').style.display = "none";

        allResults.push({
            name: currentUser,
            score: resultText,
            date: new Date().toLocaleString('az-AZ')
        });
        localStorage.setItem('quizResults', JSON.stringify(allResults));
        alert("Test bitdi! Nəticələri yoxlaya bilərsiniz.");
    }

    function clearResults() {
        if(confirm("Silinsin?")) { localStorage.removeItem('quizResults'); allResults = []; updateAdminUI(); }
    }
</script>
</body>
</html>
